# ─────────────────────────────────────────────────────────────────────────────
# Canopy Sight — YOLO11 Training Hyperparameters
# Optimised for wildlife + security detection on surveillance footage.
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ────────────────────────────────────────────────────────────────────
model: yolo11m.pt          # YOLO11-Medium: best speed/accuracy for edge deployment
                           # Options: yolo11n (fastest), yolo11s, yolo11m, yolo11l, yolo11x (most accurate)
imgsz: 640                 # Input resolution
pretrained: true           # Fine-tune from COCO pre-trained weights

# ── Training schedule ────────────────────────────────────────────────────────
epochs: 150
patience: 30               # Early stopping — stop if no improvement for 30 epochs
batch: 16                  # Reduce to 8 if <16GB VRAM
workers: 8

# ── Optimiser ────────────────────────────────────────────────────────────────
optimizer: AdamW
lr0: 0.001                 # Initial learning rate
lrf: 0.01                  # Final LR = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── Loss weights ─────────────────────────────────────────────────────────────
box: 7.5                   # Bounding box regression loss
cls: 0.5                   # Classification loss
dfl: 1.5                   # Distribution focal loss

# ── Augmentation (YOLO built-in, supplements Albumentations) ────────────────
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 2.0
perspective: 0.0002
flipud: 0.0
fliplr: 0.5
mosaic: 1.0                # Mosaic augmentation — excellent for small object detection
mixup: 0.15                # MixUp augmentation
copy_paste: 0.3            # Copy-paste augmentation — great for rare class upsampling

# ── Inference thresholds (used during validation) ────────────────────────────
conf: 0.25
iou: 0.7

# ── Export targets ───────────────────────────────────────────────────────────
export_formats:
  - onnx                   # Primary: ONNX for edge-agent (onnxruntime-node)
  - tflite                 # Optional: TFLite for Raspberry Pi / Jetson Nano
  - torchscript            # Optional: TorchScript for PyTorch serving

export_onnx:
  opset: 17
  simplify: true
  dynamic: false           # Fixed batch size = 1 for edge inference
  half: false              # FP32 for CPU compatibility; enable for GPU deployment

# ── Experiment tracking ──────────────────────────────────────────────────────
project: canopy-sight-detector
name: yolo11m-wildlife-security-v1
save: true
save_period: 10            # Save checkpoint every 10 epochs
plots: true                # Save training curves

wandb:
  enabled: true
  project: canopy-sight
  tags: [yolo11, wildlife, security, anti-poaching, surveillance]

# ── Hardware ─────────────────────────────────────────────────────────────────
device: 0                  # 0 = first GPU, "cpu" for CPU-only
amp: true                  # Automatic Mixed Precision (FP16) — 2x speedup on GPU

# ── Behavior classifier ──────────────────────────────────────────────────────
behavior_classifier:
  backbone: efficientnet_b2
  pretrained: true          # ImageNet weights
  num_classes: 8
  input_size: [224, 224]
  sequence_length: 5        # 5-frame temporal window per tracked object
  epochs: 60
  lr: 0.0003
  batch: 64
  dropout: 0.4
  label_smoothing: 0.1
